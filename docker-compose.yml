version: '3.8'

services:
  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heor-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./heor.db
      - AUTO_CREATE_TABLES=true
      - SEED_DEMO_DATA=true
      - CORS_ORIGINS=["http://localhost:3000","http://localhost","https://mokangmedical.github.io"]
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs
      - backend-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 前端静态文件服务
  frontend:
    image: nginx:alpine
    container_name: heor-frontend
    ports:
      - "3000:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # 可选：PostgreSQL数据库（生产环境）
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: heor-postgres
  #   environment:
  #     - POSTGRES_DB=heor
  #     - POSTGRES_USER=heor
  #     - POSTGRES_PASSWORD=heor_secret_password
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  backend-data:
  backend-logs:
  backend-uploads:
  # postgres-data:
